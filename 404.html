<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>404 — Zev Kershman</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=array@800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Mono', monospace;
      background: #0A0A0A;
      color: #F0F0F0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 480px; padding: 24px; }
    h1 {
      font-family: 'Array', sans-serif;
      font-weight: 800;
      font-size: clamp(48px, 10vw, 96px);
      color: #0055FF;
      line-height: 1;
      margin-bottom: 16px;
    }
    p { color: #555; font-size: 14px; margin-bottom: 32px; }
    a {
      color: #F0F0F0;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid #0055FF;
      padding-bottom: 2px;
      text-decoration: none;
      transition: color 0.3s;
    }
    a:hover { color: #C9A84C; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>This page doesn't exist. But the system that brought you here does.</p>
    <a href="/">BACK TO HOME</a>
  </div>
</body>
</html>
